name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Dispara en tags como v0.1.0

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27'
      
      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      
      - name: Build DmxVst VST3
        run: |
          cmake --build build --config Release --target DmxVst
      
      - name: Build LuxAutomator Standalone
        run: |
          cmake --build build --config Release --target LuxAutomator
      
      - name: Prepare VST3 Plugin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\vst3" -Force | Out-Null
          Copy-Item -Path "build\DmxVst_artefacts\Release\VST3\LuxSync DMX.vst3" -Destination "dist\vst3\" -Recurse -Force
      
      - name: Prepare Standalone Apps
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\standalone" -Force | Out-Null
          Copy-Item -Path "build\DmxVst_artefacts\Release\Standalone\*.exe" -Destination "dist\standalone\" -Force
          Copy-Item -Path "build\LuxAutomator_artefacts\Release\*.exe" -Destination "dist\standalone\" -Force
      
      - name: Create ZIP Archives
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\vst3\*" -DestinationPath "LuxSync-DMX-VST3-$tagName-Windows-x64.zip" -Force
          Compress-Archive -Path "dist\standalone\*" -DestinationPath "LuxSync-AIAutomator-$tagName-Windows-x64.zip" -Force
          Get-ChildItem -Path "*.zip" | Select-Object Name, Length
      
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-releases
          path: "*.zip"
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27'
      
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
      
      - name: Build DmxVst (AU/VST3)
        run: |
          cmake --build build --config Release --target DmxVst
      
      - name: Build LuxAutomator Standalone
        run: |
          cmake --build build --config Release --target LuxAutomator
      
      - name: Check Build Artifacts
        run: |
          echo "=== Checking artifacts ==="
          find build -name "*.app" -o -name "*.component" -o -name "*.vst3" | head -20
      
      - name: Prepare Artifacts
        run: |
          mkdir -p dist/au dist/vst3 dist/standalone
          find build/DmxVst_artefacts/Release -name "*.component" -type d -exec cp -r {} dist/au/ \; 2>/dev/null || true
          find build/DmxVst_artefacts/Release -name "*.vst3" -type d -exec cp -r {} dist/vst3/ \; 2>/dev/null || true
          find build/LuxAutomator_artefacts/Release -name "*.app" -type d -exec cp -r {} dist/standalone/ \; 2>/dev/null || true
      
      - name: Create DMG - AU Plugin
        run: |
          if [ -d "dist/au" ] && [ "$(ls -A dist/au)" ]; then
            mkdir -p dmg_au
            cp -r dist/au/* dmg_au/
            ln -s /Library/Audio/Plug-Ins/Components dmg_au/AU-Plugins
            hdiutil create -volname "LuxSync DMX AU" -srcfolder dmg_au -ov -format UDZO "LuxSync-DMX-AU-${{ github.ref_name }}-macOS-${{ matrix.arch }}.dmg"
            echo "AU DMG created successfully"
          else
            echo "Warning: AU plugin not found, skipping AU DMG"
          fi
      
      - name: Create DMG - VST3 Plugin
        run: |
          if [ -d "dist/vst3" ] && [ "$(ls -A dist/vst3)" ]; then
            mkdir -p dmg_vst3
            cp -r dist/vst3/* dmg_vst3/
            ln -s /Library/Audio/Plug-Ins/VST3 dmg_vst3/VST3-Plugins
            hdiutil create -volname "LuxSync DMX VST3" -srcfolder dmg_vst3 -ov -format UDZO "LuxSync-DMX-VST3-${{ github.ref_name }}-macOS-${{ matrix.arch }}.dmg"
            echo "VST3 DMG created successfully"
          else
            echo "Warning: VST3 plugin not found, skipping VST3 DMG"
          fi
      
      - name: Create DMG - Standalone App
        run: |
          if [ -d "dist/standalone" ] && [ "$(ls -A dist/standalone)" ]; then
            mkdir -p dmg_app
            cp -r dist/standalone/* dmg_app/
            hdiutil create -volname "LuxSync AI Automator" -srcfolder dmg_app -ov -format UDZO "LuxSync-AIAutomator-${{ github.ref_name }}-macOS-${{ matrix.arch }}.dmg"
            echo "Standalone DMG created successfully"
          else
            echo "Warning: Standalone app not found, skipping Standalone DMG"
          fi
      
      - name: List Generated DMGs
        run: |
          echo "=== Generated DMGs ==="
          ls -lh *.dmg 2>/dev/null || echo "No DMGs found"
      
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-releases-${{ matrix.arch }}
          path: "*.dmg"
          retention-days: 7

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release Directory
        run: mkdir -p release-artifacts
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      
      - name: Organize Release Artifacts
        run: |
          echo "=== All Downloaded Artifacts ==="
          find all-artifacts -type f | sort
          echo ""
          echo "=== Copying to release-artifacts ==="
          find all-artifacts -type f -exec cp {} release-artifacts/ \;
          echo ""
          echo "=== Final Release Artifacts ==="
          ls -lh release-artifacts/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
