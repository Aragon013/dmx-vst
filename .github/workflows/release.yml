name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 2>&1 | Tee-Object -FilePath build-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build DmxVst (VST3 + Standalone)
        shell: pwsh
        run: |
          cmake --build build --config Release --target DmxVst 2>&1 | Tee-Object -FilePath build-windows.log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build LuxAutomator (Standalone)
        shell: pwsh
        run: |
          cmake --build build --config Release --target LuxAutomator 2>&1 | Tee-Object -FilePath build-windows.log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prepare artifacts
        shell: pwsh
        run: |
          "=== DmxVst_artefacts tree ===" | Tee-Object -FilePath build-windows.log -Append
          Get-ChildItem -Recurse build/DmxVst_artefacts/Release -ErrorAction SilentlyContinue | ForEach-Object FullName | Tee-Object -FilePath build-windows.log -Append
          "=== LuxAutomator_artefacts tree ===" | Tee-Object -FilePath build-windows.log -Append
          Get-ChildItem -Recurse build/LuxAutomator_artefacts/Release -ErrorAction SilentlyContinue | ForEach-Object FullName | Tee-Object -FilePath build-windows.log -Append

          New-Item -ItemType Directory -Path "dist/vst3","dist/standalone" -Force | Out-Null

          $vst3 = Get-ChildItem -Path build/DmxVst_artefacts/Release -Recurse -Directory -Filter *.vst3 -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $vst3) { throw "VST3 bundle not found under build/DmxVst_artefacts/Release" }
          Copy-Item $vst3.FullName "dist/vst3/" -Recurse -Force

          $dmxExe = Get-ChildItem -Path build/DmxVst_artefacts/Release -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $dmxExe) { throw "DmxVst Standalone .exe not found under build/DmxVst_artefacts/Release" }
          Copy-Item $dmxExe.FullName "dist/standalone/" -Force

          $autoExe = Get-ChildItem -Path build/LuxAutomator_artefacts/Release -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $autoExe) { throw "LuxAutomator .exe not found under build/LuxAutomator_artefacts/Release" }
          Copy-Item $autoExe.FullName "dist/standalone/" -Force

      - name: Create ZIP archives
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist/vst3/*" -DestinationPath "LuxSync-DMX-VST3-$tag-Windows-x64.zip" -Force
          Compress-Archive -Path "dist/standalone/*" -DestinationPath "LuxSync-AIAutomator-$tag-Windows-x64.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-releases
          path: "*.zip"
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        shell: bash
        run: |
          git config user.email "ci@ci"
          git config user.name "ci"
          git checkout --orphan ci-logs-windows
          git reset
          cp build-windows.log win-build.log 2>/dev/null || true
          git add -f win-build.log
          git commit -m "CI log windows" || true
          git push -f origin ci-logs-windows

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          set -o pipefail
          cmake -S . -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} 2>&1 | tee build-macos.log

      - name: Build DmxVst (AU/VST3)
        run: |
          set -o pipefail
          cmake --build build --config Release --target DmxVst 2>&1 | tee -a build-macos.log

      - name: Build LuxAutomator (Standalone)
        run: |
          set -o pipefail
          cmake --build build --config Release --target LuxAutomator 2>&1 | tee -a build-macos.log

      - name: Upload build log on failure
        if: failure()
        run: |
          git config user.email "ci@ci"
          git config user.name "ci"
          git checkout --orphan ci-logs-${{ matrix.arch }}
          git reset
          cp build-macos.log "macos-${{ matrix.arch }}.log" 2>/dev/null || true
          git add -f "macos-${{ matrix.arch }}.log"
          git commit -m "CI log macos ${{ matrix.arch }}" || true
          git push -f origin ci-logs-${{ matrix.arch }}

      - name: Prepare artifacts
        run: |
          mkdir -p dist/au dist/vst3 dist/standalone
          find build/DmxVst_artefacts/Release -maxdepth 2 -name "*.component" -exec cp -R {} dist/au/ \; 2>/dev/null || true
          find build/DmxVst_artefacts/Release -maxdepth 2 -name "*.vst3" -exec cp -R {} dist/vst3/ \; 2>/dev/null || true
          find build/LuxAutomator_artefacts/Release -maxdepth 2 -name "*.app" -exec cp -R {} dist/standalone/ \; 2>/dev/null || true

      - name: Create DMGs
        run: |
          tag="${{ github.ref_name }}"
          arch="${{ matrix.arch }}"
          if [ -n "$(ls -A dist/au 2>/dev/null)" ]; then
            mkdir -p dmg_au && cp -R dist/au/* dmg_au/
            ln -s /Library/Audio/Plug-Ins/Components dmg_au/Components || true
            hdiutil create -volname "LuxSync DMX AU" -srcfolder dmg_au -ov -format UDZO "LuxSync-DMX-AU-$tag-macOS-$arch.dmg"
          fi
          if [ -n "$(ls -A dist/vst3 2>/dev/null)" ]; then
            mkdir -p dmg_vst3 && cp -R dist/vst3/* dmg_vst3/
            ln -s /Library/Audio/Plug-Ins/VST3 dmg_vst3/VST3 || true
            hdiutil create -volname "LuxSync DMX VST3" -srcfolder dmg_vst3 -ov -format UDZO "LuxSync-DMX-VST3-$tag-macOS-$arch.dmg"
          fi
          if [ -n "$(ls -A dist/standalone 2>/dev/null)" ]; then
            mkdir -p dmg_app && cp -R dist/standalone/* dmg_app/
            hdiutil create -volname "LuxSync AI Automator" -srcfolder dmg_app -ov -format UDZO "LuxSync-AIAutomator-$tag-macOS-$arch.dmg"
          fi
          ls -lh *.dmg || echo "No DMGs produced"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-releases-${{ matrix.arch }}
          path: "*.dmg"
          retention-days: 7

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find all-artifacts -type f \( -name "*.zip" -o -name "*.dmg" \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
