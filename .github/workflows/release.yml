name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Dispara en tags como v0.1.0

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27'
      
      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      
      - name: Build DmxVst VST3
        run: |
          cmake --build build --config Release --target DmxVst
      
      - name: Build LuxAutomator Standalone
        run: |
          cmake --build build --config Release --target LuxAutomator
      
      - name: Prepare artifacts - Windows VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\windows\vst3" -Force | Out-Null
          Copy-Item -Path "build\DmxVst_artefacts\Release\VST3\*" -Destination "dist\windows\vst3\" -Recurse -Force
      
      - name: Prepare artifacts - Windows Standalone
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\windows\standalone" -Force | Out-Null
          Copy-Item -Path "build\LuxAutomator_artefacts\Release\Standalone\*" -Destination "dist\windows\standalone\" -Recurse -Force
      
      - name: Package VST3 & Standalone
        shell: pwsh
        run: |
          # Package VST3 as ZIP
          Compress-Archive -Path "dist\windows\vst3\*" -DestinationPath "LuxSync-DMX-VST3-v${{ github.ref_name }}-Windows-x64.zip" -Force
          
          # Package Standalone as ZIP
          Compress-Archive -Path "dist\windows\standalone\*" -DestinationPath "LuxSync-AIAutomator-v${{ github.ref_name }}-Windows-x64.zip" -Force
      
      - name: Upload Windows VST3 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-vst3
          path: LuxSync-DMX-VST3-*.zip
          retention-days: 7
      
      - name: Upload Windows Standalone Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone
          path: LuxSync-AIAutomator-v*.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27'
      
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
      
      - name: Build DmxVst (AU/VST3)
        run: |
          cmake --build build --config Release --target DmxVst
      
      - name: Build LuxAutomator Standalone
        run: |
          cmake --build build --config Release --target LuxAutomator
      
      - name: Prepare artifacts
        run: |
          mkdir -p dist/au dist/vst3 dist/standalone
          cp -r build/DmxVst_artefacts/Release/AU/*.component dist/au/ 2>/dev/null || true
          cp -r build/DmxVst_artefacts/Release/VST3/*.vst3 dist/vst3/ 2>/dev/null || true
          cp -r build/LuxAutomator_artefacts/Release/Standalone/*.app dist/standalone/ 2>/dev/null || true
      
      - name: Create DMG for AU Plugin
        if: always()
        run: |
          mkdir -p dmg_au/LuxSync-AU-${{ matrix.arch }}
          cp -r dist/au/* dmg_au/LuxSync-AU-${{ matrix.arch }}/ 2>/dev/null || true
          ln -s /Library/Audio/Plug-Ins/Components dmg_au/AU-Plugins 2>/dev/null || true
          hdiutil create -volname "LuxSync DMX AU" -srcfolder dmg_au -ov -format UDZO "LuxSync-DMX-AU-v${{ github.ref_name }}-macOS-${{ matrix.arch }}.dmg"
      
      - name: Create DMG for VST3 Plugin
        if: always()
        run: |
          mkdir -p dmg_vst3/LuxSync-VST3-${{ matrix.arch }}
          cp -r dist/vst3/* dmg_vst3/LuxSync-VST3-${{ matrix.arch }}/ 2>/dev/null || true
          ln -s /Library/Audio/Plug-Ins/VST3 dmg_vst3/VST3-Plugins 2>/dev/null || true
          hdiutil create -volname "LuxSync DMX VST3" -srcfolder dmg_vst3 -ov -format UDZO "LuxSync-DMX-VST3-v${{ github.ref_name }}-macOS-${{ matrix.arch }}.dmg"
      
      - name: Create DMG for Standalone
        if: always()
        run: |
          mkdir -p dmg_app/LuxSync-Automator-${{ matrix.arch }}
          cp -r dist/standalone/* dmg_app/LuxSync-Automator-${{ matrix.arch }}/ 2>/dev/null || true
          hdiutil create -volname "LuxSync AI Automator" -srcfolder dmg_app -ov -format UDZO "LuxSync-AIAutomator-v${{ github.ref_name }}-macOS-${{ matrix.arch }}.dmg"
      
      - name: Upload AU Plugin
        uses: actions/upload-artifact@v4
        with:
          name: macos-au-${{ matrix.arch }}
          path: "LuxSync-DMX-AU-*.dmg"
          retention-days: 7
      
      - name: Upload VST3 Plugin
        uses: actions/upload-artifact@v4
        with:
          name: macos-vst3-${{ matrix.arch }}
          path: "LuxSync-DMX-VST3-*.dmg"
          retention-days: 7
      
      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: macos-standalone-${{ matrix.arch }}
          path: "LuxSync-AIAutomator-*.dmg"
          retention-days: 7

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release Artifacts Directory
        run: |
          mkdir -p release-artifacts
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts-temp
      
      - name: Organize and move artifacts
        run: |
          find artifacts-temp -type f \( -name "*.zip" -o -name "*.dmg" \) -exec cp {} release-artifacts/ \;
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
